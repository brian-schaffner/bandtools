name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: false
        default: cursor/flyer-agent-v2-980b
      skip_secrets:
        description: Skip secret sync (use existing Fly secrets)
        type: boolean
        default: true
      run_wild_d_experiment:
        description: After deploy, run live H1/H2 wild D band photo experiment
        type: boolean
        default: false
  push:
    branches:
      - cursor/flyer-agent-v2-980b
      - cursor/flyer-agent-980b

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Preflight Fly auth
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_IO_TOKEN: ${{ secrets.FLY_IO_TOKEN }}
          fly.io token: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # shellcheck source=scripts/deploy/lib.sh
          source scripts/deploy/lib.sh
          resolve_fly_api_token
          if [[ -z "${FLY_API_TOKEN:-}" ]]; then
            echo "ERROR: Fly token not found. Set GitHub secret FLY_API_TOKEN (or Cursor secret fly.io token)." >&2
            exit 1
          fi
          flyctl version
          flyctl auth whoami

      - name: Deploy to staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_IO_TOKEN: ${{ secrets.FLY_IO_TOKEN }}
          fly.io token: ${{ secrets.FLY_API_TOKEN }}
        run: |
          source scripts/deploy/lib.sh
          resolve_fly_api_token
          ARGS=(--no-smoke)
          if [[ "${{ github.event.inputs.skip_secrets }}" == "true" || "${{ github.event_name }}" == "push" ]]; then
            ARGS+=(--skip-secrets)
          fi
          ./scripts/deploy-staging.sh "${ARGS[@]}"

      - name: Verify Flyer Agent v2 routes
        run: |
          sleep 15
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST "https://bandtools-test.fly.dev/flyers/agent/api/gig/smoke/approve" \
            -H "Content-Type: application/json" \
            -d '{"option":"A"}')
          # 401/403 = route exists (auth required); 404 = old image still running
          if [[ "$code" == "404" ]]; then
            echo "ERROR: /agent/api/gig/.../approve returned 404 — v2 may not be deployed" >&2
            exit 1
          fi
          echo "Flyer Agent approve route responded with HTTP $code (expected non-404)"

  wild-d-band-experiment:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_wild_d_experiment }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: deploy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r gig-flyers/requirements.txt

      - name: Run live H1/H2 experiment
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_IMAGE_MODEL: gemini-2.5-flash-image
        run: |
          cd gig-flyers
          python3 scripts/experiment_wild_d_band.py --live | tee /tmp/wild_d_experiment.log
          cat output/experiments/wild_d_band/results.json

      - name: Upload experiment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wild-d-band-experiment
          path: |
            gig-flyers/output/experiments/wild_d_band/*.png
            gig-flyers/output/experiments/wild_d_band/results.json
