# fly.toml — Band Tools hub (Setlist Loader + Gig Flyers proxy)
# https://bandtools.fly.dev

app = 'bandtools'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'
  BACKEND_PORT = '8002'
  FRONTEND_PORT = '3000'
  DATA_DIR = '/data'
  FLYERS_UPSTREAM = 'https://gig-flyers.fly.dev'

[mounts]
  source = 'bandtools_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/api/health'
