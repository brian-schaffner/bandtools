version: "1.0"

project:
  name: "Authentic Band Flyer System"
  purpose: >
    Create concert flyers that appear to have been produced by real
    promoters rather than generated by AI.

success_criteria:
  primary_goal: >
    Looks like a real flyer someone would have seen posted in a venue,
    record store, bar, VFW hall, American Legion, or community bulletin board.
  avoid_goal: >
    Looking like a polished AI-generated vintage poster.

core_principles:
  - "AI optimizes. Real promoters ship."
  - "Information is more important than aesthetics."
  - "The flyer is announcing an event, not building a brand."
  - "Believability is more important than beauty."
  - "Simulate production constraints, not vintage aesthetics."
  - "The flyer should feel assembled rather than designed."

information_hierarchy:
  priority_order:
    - venue
    - date
    - band_name
    - time
    - location
    - photography
    - secondary_text

reference_models:
  primary:
    - "Early Guns N Roses Troubadour flyers"
    - "Roxy handbills"
    - "Waters Club flyers"
    - "American Legion event flyers"
    - "VFW event flyers"
    - "Regional promoter photocopies"
    - "Local newspaper entertainment ads"
  secondary:
    - "County fair entertainment posters"
    - "Regional touring act advertisements"
    - "Community event handbills"
  avoid:
    - "Modern festival posters"
    - "Canva templates"
    - "Instagram event graphics"
    - "Facebook promotional art"
    - "Album covers"
    - "Movie posters"

layout_rules:
  philosophy:
    - "One strong photo is preferred."
    - "Typography should carry most communication."
    - "Large empty areas are acceptable."
    - "Slightly awkward composition is acceptable."
    - "Imperfect balance is acceptable."
    - "Reserve ~48px safe margin on top and sides so header text is never clipped."
  footer:
    required: true
    must_include:
      - venue_name
      - full_address
      - show_time
    never_use:
      - grey_placeholder_bar
      - brush_stroke_strip
      - blank_decorative_bar_below_photo
  preferred_structures:
    simple_club_flyer:
      sections:
        - photo
        - band_name
        - date
        - venue
        - time
    regional_promoter_flyer:
      sections:
        - photo
        - band_name
        - venue
        - date
        - location
        - time

typography:
  rules:
    - "Typography should remain functional if photo is removed."
    - "Band name should be large."
    - "Venue should be nearly as important as band name."
    - "Date should be highly visible."
    - "Maximum three fonts."
    - "Prefer one font family."
    - "Avoid decorative typography."
  preferred_traits:
    - bold
    - condensed
    - readable
    - utilitarian

photography:
  preferred:
    - "Band holding instruments"
    - "Natural group photo"
    - "Casual candid image"
  avoid:
    - "Composite imagery"
    - "Fantasy artwork"
    - "Multiple photo collages"
    - "Influencer style poses"
    - "Heavy glamour styling"

photo_fidelity:
  priority: highest_after_event_text
  rules:
    - "The band photograph must match the reference EXACTLY in composition: same faces, instruments, poses, member count"
    - "ALL band members from the reference must remain fully visible — no member cropped, cut off, hidden, or removed"
    - "NO warping, stretching, re-posing, AI face changes, beauty filters, or reinterpretation of the people"
    - "Flyer design wraps AROUND the locked band photo — typography and graphics must not transform the photo"
    - "The band photo is pre-placed on the canvas — never redraw, regenerate, or duplicate the people"
    - "Color grading, duotone tint, or print-style color treatment is applied in preprocessing — do NOT change faces, poses, or composition"
  reference_edit_mode:
    - "The band photo is pre-composited on the flyer canvas in a mask-protected region (images.edit + mask, input_fidelity=high)"
    - "The locked photo pixels are final — add typography and flyer graphics only in empty paper areas around the photo"
    - "Do NOT generate a new band photo, composite, or AI-restyled version of the band"
    - "Do NOT add borders, frames, or mats around the band photo — it is already pasted on the canvas"
    - "Do NOT duplicate, tile, or crop-repeat any part of the band photo below or beside the main photo"
    - "Do NOT place typography across the photo border — keep date, time, and band name in clear paper margins"
    - "Keep all typography and graphics clear of the photo margin — never overlap text with the photo area"
    - "Layout creativity applies to type, borders, and background only — the band photo region is not editable"
  applies_to_all_tiers: true
  creative_tier_note: >
    Creative layout may change flyer composition, colors, and type placement, but the band photo
    must remain the same people, poses, and framing as the reference — no cropping members, no diagonal
    type across faces. Color tinting for design is OK; faces and composition are not.

photo_treatment:
  doctrine: >
    The uploaded band photo is SOURCE ARTWORK, not inspiration.
    Never regenerate, redraw, repaint, stylize, or reinterpret the people.
    Treat the photo exactly like an art director placing a photograph into an InDesign layout.
    The AI should never satisfy "photo fidelity" by simply placing the original rectangle on top.

  allowed_operations:
    - crop
    - scale
    - translate
    - "rotate <=2°"
    - perspective correction
    - brightness
    - contrast
    - curves
    - saturation
    - film grain
    - paper texture
    - halftone
    - multiply blend
    - screen blend
    - overlay blend
    - edge feather
    - vignette
    - color toning
    - frame clipping

  forbidden_operations:
    - repaint
    - redraw
    - inpaint
    - outpaint
    - replace faces
    - change expressions
    - invent limbs
    - change clothing
    - change instruments
    - hallucinate fingers
    - hallucinate guitars
    - hallucinate people
    - generate new humans
    - AI face enhancement
    - beauty filter
    - style transfer
    - artistic reinterpretation

  two_stage_pipeline:
    enabled: true
    description: >
      Stage 1 generates layout (background, typography, boxes, graphic elements) WITHOUT the photo.
      Stage 2 places the photograph using PIL only (crop, scale, blend, clipping mask).
      This separation is much more robust than asking one model to do everything.

    stage_1:
      name: Layout Generation
      generates:
        - background
        - typography
        - boxes
        - graphic elements
        - borders
        - textures
      excludes:
        - band photo
        - people
        - faces
        - instruments
        - musicians

    stage_2:
      name: Photo Placement
      tool: PIL/Pillow only
      operations:
        - crop
        - scale
        - blend
        - clipping mask
      note: >
        Nothing else. The AI model never sees or touches the photo pixels.

production_constraints:
  mindset:
    - "Created quickly"
    - "Limited budget"
    - "Limited tools"
    - "Practical purpose"
  assumed_tools:
    - "Band publicity photo"
    - "Photocopier"
    - "Basic typesetting"
    - "Paste-up layout"
    - "Limited print budget"

anti_ai_rules:
  visual_tropes:
    reject_if_present:
      - fire
      - lightning
      - skulls
      - wolves
      - ravens
      - dragons
      - wings
      - fantasy_landscapes
      - floating_instruments
      - neon_effects
      - glowing_edges
      - ai_yellow_cast
      - uniform_golden_wash
      - sepia_ai_filter
      - mustard_monochrome
  design_tropes:
    reject_if_present:
      - perfect_symmetry
      - over_optimization
      - excessive_balance
      - too_many_focal_points
      - poster_like_composition
  texture_tropes:
    reject_if_present:
      - generic_grunge_overlay
      - uniform_distressing
      - artificial_aging
      - stock_vintage_textures

authenticity_checks:
  questions:
    - "Could this plausibly have existed in 1987?"
    - "Would a local promoter realistically make this?"
    - "Does the venue feel important?"
    - "Can someone understand the event in under three seconds?"
    - "Does this feel informational rather than promotional?"

evaluation:
  metrics:
    information_score:
      description: >
        Can venue, date, band name, and time be understood immediately?
      scale: "1-10"
      target: 8
    authenticity_score:
      description: >
        Could this plausibly be mistaken for a real historical flyer?
      scale: "1-10"
      target: 8
    ai_detection_score:
      description: >
        How likely is a designer to identify the flyer as AI-generated?
      scale: "1-10"
      target_maximum: 3
    local_promoter_score:
      description: >
        Does this feel like a local event announcement rather than a marketing campaign?
      scale: "1-10"
      target: 8

lindsey_lane_band:
  identity:
    type: "Working cover band"
    repertoire: "60s through today"
  markets:
    - festivals
    - american_legions
    - community_events
    - regional_clubs
    - corporate_events
    - private_events
  not_intended_to_resemble:
    - hair_metal_band
    - punk_band
    - arena_rock_act
    - tribute_band
  preferred_photos:
    primary:
      - "Instrument photo"
    secondary:
      - "Natural standing group photo"
  logo:
    usage:
      - "May be used as a compositional element"
      - "May function as a graphic anchor"
    avoid:
      - "Decorative logo sticker placement"
      - "Repeated logo treatment"

workflow:
  steps:
    - gather_event_information
    - select_best_photo
    - create_initial_layout
    - evaluate_against_doctrine
    - identify_ai_tells
    - revise
    - reevaluate
    - approve_when_thresholds_met
  approval_thresholds:
    authenticity_score: 8
    information_score: 8
    local_promoter_score: 8
    ai_detection_score_maximum: 3

variations:
  # A/B/C map to a creativity spectrum with distinct layout structures (same engine, different prompts).
  - id: conservative
    label: "A) Conservative"
    tier: conservative
    creative_freedom: low
    orientation: portrait
    description: >
      Strict utilitarian regional promoter handbill — venue and date dominate, minimal layout risk,
      black-and-white or very limited color, type-heavy stacked blocks, photocopy austerity.
    creative_directive:
      - "Follow style.yaml literally — information clarity over design flair"
      - "Simple club handbill or regional promoter layout ONLY — vertical stacked type blocks"
      - "Prefer black-and-white photocopy OR one ink color (red or black) on off-white paper"
      - "Band photo is pre-composited on the canvas — supporting element, not something to draw or generate"
      - "No bold composition experiments, no decorative risks, no accent graphics"
      - "If unsure, choose the more boring, more readable layout"
    layout_structure:
      - "Portrait single column: venue name bar on top, date/time bar below, band name, then photo rectangle"
      - "Symmetrical or near-symmetrical grid — familiar club-flyer stack"
      - "Type occupies 60%+ of visual weight; band photo is one supporting rectangle below the type stack"
    layout_guidance:
      - "Venue name largest; date and time in separate high-contrast readable bars"
      - "No diagonal bands, no collage layers, no torn edges"
      - "Footer block required: venue + full address — no grey placeholder bar below photo"
    color_approach: "Black-and-white photocopy OR black/red ink on cream paper — max one accent color"
    typography_approach: "Bold condensed sans or utilitarian serif blocks — all caps venue, clear date/time"
    production_feel: "Fresh photocopy on cheap paper — flat, slightly misregistered, no gloss"
    photo_placement: "Locked band photo below the type stack — add typography around it, do not redraw people"
    negative_prompts:
      - "No experimental layouts, asymmetry, or collage"
      - "No full-color gradients, neon, or festival poster palettes"
      - "No ticket stubs, torn edges, or decorative frames"
      - "No second band photo, footer strip, or cropped repeat of the reference below the main photo"
      - "No grey bars, brush strokes, or blank placeholder strips below the photo"
      - "No Instagram square or polished marketing aesthetics"
    risk_level: "minimal"
    layout_experimentation: "none — proven handbill patterns only"
    distinct_from:
      - "Bold asymmetry, accent color blocks, or paste-up seams (Medium/Creative)"
      - "Ticket stubs, torn paper, diagonal bands (Creative)"
      - "Full-color or high-saturation treatments (Medium/Creative)"

  - id: medium
    label: "B) Medium"
    tier: medium
    creative_freedom: medium
    orientation: portrait_or_horizontal_pasteup
    description: >
      Authentic promoter handbill with modest layout flair — some venue-appropriate color,
      slight paste-up asymmetry, ONE accent element (starburst, underline bar, or corner stamp),
      still photocopied and regional.
    creative_directive:
      - "Honor style.yaml and information hierarchy first"
      - "Use a two-zone paste-up: type column + offset photo column OR horizontal band layout"
      - "Allow moderate color from venue context — muted blues, warm bar tones, one accent"
      - "Include exactly ONE accent element (starburst date, underline bar, corner stamp, tape seam)"
      - "Slight asymmetry OK for flyer layout — photo paste-up may shift position/angle on page, NOT warp photo content"
      - "Do not chase polish — still feels photocopied and regional"
    layout_structure:
      - "Two-column paste-up OR horizontal tri-band: header type / photo offset / footer type"
      - "Photo offset left or right with visible paste-up edge or tape seam"
      - "One accent graphic only — do not stack multiple decorative devices"
      - "Optional light halftone photo, thicker paste-up border, hairline double rules under header"
    layout_guidance:
      - "Photo placement can shift (left column, inset thumbnail) but one photo only"
      - "Venue and date remain largest readable elements despite asymmetry"
    color_approach: "Limited venue-appropriate color — 2–3 ink colors max, muted saturation, photocopy texture"
    typography_approach: "Mix one display headline with utilitarian body blocks — contrast without ornament overload"
    production_feel: "Photocopied paste-up with visible seams, slight rotation, one accent sticker or stamp"
    photo_placement: "Locked band photo offset in column or inset — typography around it only"
    negative_prompts:
      - "No plain symmetric stack-only layout (that is Conservative)"
      - "No wild collage, ticket stubs, or heavy torn-paper effects (that is Creative)"
      - "No more than one accent decorative element"
      - "No neon fantasy, Canva gradients, or festival poster symmetry"
    risk_level: "moderate"
    layout_experimentation: "some — alternate grids and paste-up layers within doctrine"
    distinct_from:
      - "Plainest utilitarian stack-only layouts (Conservative)"
      - "Ticket stubs, torn edges, diagonal neon bar signs (Creative)"
      - "Symmetrical festival posters or brand-forward marketing art"

  - id: creative
    label: "C) Creative"
    tier: creative
    creative_freedom: high
    orientation: style_dna_archetypes
    description: >
      Style DNA archetype composer — each generation picks a designed template
      (xerox punk, duotone modern, psychedelic, boutique). Seeded by gig + round;
      collision-safe hierarchy with no overlapping text.
    creative_directive:
      - "Event facts (venue, date, band, time) remain sacred and instantly legible"
      - "Band reference photo fidelity rules still apply — no distortion; all members visible"
      - "Try a memorable real-world device: ticket stub perforation, torn flyer edge, diagonal type band"
      - "Bolder venue-appropriate color — bar sign glow, warm tungsten, beer-brand tones — NOT sci-fi neon"
      - "Layered paste-up collage energy — overlapping blocks with readable hierarchy on top"
      - "Must still look like a real promoter made it — NOT a polished AI poster or Canva template"
    layout_structure:
      - "Seeded archetypes: xerox_punk, duotone_modern, psychedelic, boutique, neon_bar, pasteup_zine, broadside, country_fair"
      - "Hand-tuned PIL templates with fixed type hierarchy per archetype"
      - "Photo treatment varies: B&W threshold, duotone strip, oval mask, full bleed"
      - "2–3 stacked decorative layers per render: corner strips, ticket stub, tape, rings, double rules"
    layout_guidance:
      - "Bolder composition: diagonal bands, overlapping blocks, collage energy"
      - "May include authentic bar neon/signage in BACKGROUND only if venue-appropriate — not fantasy glow"
      - "Venue/date must read in under 3 seconds despite bolder layout"
    color_approach: "Bolder venue palette — warm tungsten, beer-brand reds, blues-bar mood — still photocopy/grain"
    typography_approach: "Strong scale contrast — huge venue/date over smaller support type; handbill urgency"
    production_feel: "Well-worn photocopy collage — torn edge, ticket stub, tape, stamp — believable promoter energy"
    photo_placement: "Locked band photo on canvas — typography and accents around it; do not draw or duplicate people"
    negative_prompts:
      - "No minimal safe stack-only layout (that is Conservative)"
      - "No single-accent subtle paste-up only (that is Medium)"
      - "No fantasy neon, sci-fi glow, illustration, or festival arena symmetry"
      - "No Canva polish, perfect gradients, or Instagram square crops"
    risk_level: "higher"
    layout_experimentation: "high — memorable composition while staying believable"
    distinct_from:
      - "Minimal safe handbill stacks (Conservative)"
      - "Mild paste-up with only one accent (Medium)"
      - "Over-polished symmetry, fantasy neon, or illustration"
