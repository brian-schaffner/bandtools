# fly.test.toml — Band Tools staging (https://bandtools-test.fly.dev)
app = 'bandtools-test'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8090'
  BACKEND_PORT = '8002'
  FRONTEND_PORT = '3000'
  FLYERS_PORT = '8080'
  DATA_DIR = '/data'
  NODE_ENV = 'production'
  GIG_FLYERS_ENV = 'test'
  GIG_FLYERS_TEST_MODE = '1'
  ROOT_PATH = '/flyers'
  GIG_OUTPUT_DIR = '/data/flyers-output'
  GIG_CALENDAR_CACHE_PATH = '/data/cache/calendar.json'
  SETLOADER_DATA_DIR = '/data/setloader'
  # A/B/C split: OpenAI for A, Gemini for B/C (requires GOOGLE_API_KEY secret)
  GIG_IMAGE_PROVIDER_SPLIT = '1'
  GIG_IMAGE_PROVIDER_A = 'openai'
  GIG_IMAGE_PROVIDER_B = 'gemini'
  GIG_IMAGE_PROVIDER_C = 'gemini'
  GEMINI_IMAGE_MODEL = 'gemini-2.5-flash-image'
  GEMINI_IMAGE_ASPECT_RATIO = '2:3'
  OPENAI_IMAGE_USE_REFERENCE = '1'
  OPENAI_IMAGE_POST_COMPOSE = '1'
  # Flyer Agent v2: LLM chat orchestration + revision briefs (OPENAI_API_KEY on Fly)
  FLYER_AGENT_LLM_CHAT = '1'
  FLYER_AGENT_CHAT_MODEL = 'gpt-4o-mini'
  FLYER_AGENT_REVISION_MODEL = 'gpt-4o-mini'

[mounts]
  source = 'bandtools_test_data'
  destination = '/data'

[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
